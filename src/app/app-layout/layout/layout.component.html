<section>
    <div class="flex md:hidden lg:hidden basis-[7%] w-[100%] bg-gradient-to-r from-[#031641] via-[#163993] to-[#031641] px-2 justify-between">
         <div class=" flex items-center">
            <img src="logo.svg" class="h-[40px]">
            <span class="text-[22px] font-bold text-white mb-[8px] oswald-uniquifier">RSM</span>
        </div>
           
        <nz-drawer [nzClosable]="false" [nzVisible]="visible"
          [nzPlacement]="placement" nzTitle="" (nzOnClose)="close()" [nzWidth]="270" [nzBodyStyle]="{backgroundcolour: '#163993', padding:'0px', overflow:'hidden'}">
          <ng-container *nzDrawerContent>
            <div class="!bg-white h-full ">
              <div class="w-full flex justify-end">
              <button (click)="close()" class="text-black text-[20px] hover:red-500 !bg-white px-2">
                ✕
              </button>
            </div>
            <div class="">
               <ul nz-menu class="!bg-white text-gray-600 font-[500] cursor-pointer px-[10px] py-[10px] justify-center m-auto flex flex-col gap-4 mb-[10px]">
              <div (click)="toHome()" routerLink="/app-layout/layout/home" routerLinkActive="active" #Hrla="routerLinkActive"  class="menu-item flex items-center gap-3" >
                <img [src]="Hrla.isActive ? 'acH.svg' : 'inH.svg'" class="h-[25px]">
                <span class="text-[18px]">Home</span>
              </div>

              <div (click)="toServices()" routerLink="/app-layout/layout/services" routerLinkActive="active" #Srla="routerLinkActive" class="flex items-center gap-3">
                <img [src]="Srla.isActive ? 'acS.svg' : 'inS.svg'" class="h-[25px]">
                <span class="text-[18px]">Services</span>
              </div>

              <div (click)="toProducts()" routerLink="/app-layout/layout/products" routerLinkActive="active" #Prla="routerLinkActive" class="flex items-center gap-3">
                <img [src]="Prla.isActive ? 'acP.svg' : 'inP.svg'" class="h-[25px]">
                <span class="text-[18px]">Products</span>
              </div>

              <div (click)="toChannels()" routerLink="/app-layout/layout/channels" routerLinkActive="active" #Chrla="routerLinkActive" class="flex items-center gap-3">
                <img [src]="Chrla.isActive ? 'acCh.svg' : 'inCh.svg'" class="h-[25px]">
                 <span class="text-[18px]">Channels</span>
              </div>

              <div (click)="toInstitutions()" routerLink="/app-layout/layout/institutions" routerLinkActive="active" #Irla="routerLinkActive" class="flex items-center gap-3">
                <img [src]="Irla.isActive ? 'acI.svg' : 'inI.svg'" class="h-[25px]">
                <span class="text-[18px]">Institutions</span>
              </div>

              <div (click)="toCategories()" routerLink="/app-layout/layout/categories" routerLinkActive="active" #Crla="routerLinkActive" class="flex items-center gap-3">
                <img [src]="Crla.isActive ? 'acC.svg' : 'inC.svg'" class="h-[25px]">
                <span class="text-[18px]">Categories</span>
              </div>

              <div (click)="toAccounts()" routerLink="/app-layout/layout/accounts" routerLinkActive="active" #Arla="routerLinkActive" class="flex items-center gap-3">
                <img [src]="Arla.isActive ? 'acA.svg' : 'inA.svg'" class="h-[25px]">
                <span class="text-[18px]">Accounts</span>
              </div>
          </ul> 
            </div>
            
          <div class="flex flex-col gap-[2px] quicksand-uniquifier border-t border-black pb-[10%] p-2 m-2  w-full">
             <div class="flex gap-3 items-center">
                <img src="darkCircle.svg" alt="" class="w-[25px]">
                <span class="text-black text-[17px] tex">{{userFullName}}</span>
                <!-- <span class="text-black text-[12px]">Manager</span> -->
            </div>
            <div class="flex items-center gap-3" (click)="backTo()">
              <img src="logoutDark.svg" alt="" class="w-[21px] ml-[4px]">
              <span class="text-black text-[17px]">Logout</span>
            </div>
          </div>   
            </div>
          </ng-container>
        </nz-drawer>
    <!-- [(ngModel)]="placement" -->
        <div class="flex gap-4 items-center">
           
            
       </div>

         <nz-radio-group >
          <label nzValue="top"></label>
        </nz-radio-group>
        <div class="flex md:hidden lg:hidden">
          <button nz-button nzType="primary" (click)="open()">
            <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" viewBox="0 0 24 24">
              <path fill="none" stroke="#ffffff" stroke-linecap="round"
              stroke-linejoin="round" stroke-width="2" d="M4 12h16M4 18h16M4 6h16"/>
          </svg>
         </button>
        </div>
    </div>
    <div
        class="basis-[7%] w-[100%] bg-gradient-to-r from-[#031641] hidden md:flex via-[#163993] to-[#031641] lg:flex items-center justify-between px-2">
        <div class=" flex items-center">
            <img src="logo.svg" class="h-[40px]">
            <span class="text-[22px] font-bold text-white mb-[8px] oswald-uniquifier">RSM</span>
        </div>
        <div class="flex gap-[41px] text-[#C7C7D8] text-[14px] cursor-pointer quicksand-uniquifier">
            <div  routerLink="/app-layout/layout/home" routerLinkActive="active1">Home</div>
            <div  routerLink="/app-layout/layout/services" routerLinkActive="active1">Services</div>
            <div  routerLink="/app-layout/layout/products" routerLinkActive="active1">Products</div>
            <div  routerLink="/app-layout/layout/channels" routerLinkActive="active1">Channels</div>
            <div  routerLink="/app-layout/layout/institutions" routerLinkActive="active1">Institutions</div>
            <div  routerLink="/app-layout/layout/categories" routerLinkActive="active1">Categories</div>
            <div  routerLink="/app-layout/layout/accounts" routerLinkActive="active1">Accounts</div>
        </div>
        <div class="flex gap-4 items-center">
            <div>
                <img src="linedivide.svg" alt="">
            </div>

            <div class="flex flex-col gap-[1.5px] quicksand-uniquifier">
                <span class="text-[#BBBBBB] text-[11px]">{{userFullName}}</span>
                <!-- <span class="text-[#BBBBBB] text-[11px]">Manager</span> -->
            </div>
            <div>
              <a nz-dropdown nzTrigger="click" [nzDropdownMenu]="userMenu">
                <img src="inverse-tri.svg" alt="">
             </a>        
            </div>
        </div>
    </div>

    <div class="bg-[#F8F8F8] w-full h-[94vh] m-auto flex flex-col p-[35px]">
        <router-outlet></router-outlet>
    </div>
</section>


  <nz-dropdown-menu #mobileMenu="nzDropdownMenu">
  <ul nz-menu>
    <li nz-menu-item>Home</li>
    <li nz-menu-item>Services</li>
    <li nz-menu-item>Settings</li>
  </ul>
</nz-dropdown-menu>

<nz-dropdown-menu #userMenu="nzDropdownMenu">
  <ul nz-menu>
    <li nz-menu-item >
       <div class="flex items-center gap-3" (click)="backTo()">
          <img src="logoutDark.svg" alt="" class="w-[21px] ml-[4px]">
          <span class="text-black text-[17px]">Logout</span>
        </div>
    </li>
  </ul>
</nz-dropdown-menu>
